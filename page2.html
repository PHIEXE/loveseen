<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ไม่รู้จะทำไงเอาแบบนี้แล้วกัน</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(135deg, #ffe0ec, #fff);
      overflow: hidden;
    }

    .box {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      z-index: 2;
    }

    h1 {
      color: #ff4d6d;
      font-size: 22px;
      margin-bottom: 25px;
    }

    .btn {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      width: 40%;
    }

    .yes {
      background: #ff4d6d;
      color: white;
    }

    .no {
      background: #ccc;
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* 💖 หัวใจลอย */
    .heart {
      position: absolute;
      color: #ff4d6d;
      animation: float 5s linear infinite;
      z-index: 1;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="box">
  <h1>เราลองคุยกันดูได้ไหม 💖</h1>

  <button class="btn yes" id="yesBtn">ได้ 💕</button>
  <button class="btn no" id="noBtn">ไม่ได้ 😢</button>
</div>

<script>
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");

  let noClicked = false;

  // ✅ กด "ได้" → ไปหน้าใหม่เลย
  yesBtn.addEventListener("click", () => {
    window.location.href = "success.html";
  });

  // ✅ กด "ไม่ได้"
  noBtn.addEventListener("click", () => {
    if (!noClicked) {
      noClicked = true;

      noBtn.innerText = "ได้ 💖";
      noBtn.classList.remove("no");
      noBtn.classList.add("yes");

      // 🔥 เล่นเสียงแบบชัวร์
      const audio = new Audio("love.mp3");
      audio.volume = 0.3; // 🔉 ปรับเสียง (0.0 - 1.0)
      audio.play().catch(() => {});

    } else {
      window.location.href = "success.html";
    }
  });

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(createHeart, 400);
</script>

</body>
</html>
